<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>報名資料確認 — 內政部國土署</title>
<link rel="stylesheet" href="style.css?v=24">
<style>
body { background: #f0f4f8; padding-top: 0; overflow-x: hidden; }
.checkin-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px 16px; }
.checkin-card { background: #fff; border-radius: 20px; padding: 36px 28px; width: 100%; max-width: 520px; box-shadow: 0 8px 40px rgba(0,0,0,.12); text-align: center; }
.checkin-logo { font-size: 3rem; margin-bottom: 8px; }
.checkin-title { font-size: 1.25rem; font-weight: 800; color: #1a3a6b; }
.checkin-sub { color: #64748b; font-size: .875rem; margin-top: 4px; }
.reg-no-display { font-size: 1.45rem; font-weight: 900; color: #1a3a6b; margin: 20px 0 8px; }
.info-grid { background: #f5f7fa; border-radius: 12px; padding: 18px 20px; margin: 18px 0; text-align: left; }
.info-row { display: flex; gap: 12px; padding: 8px 0; border-bottom: 1px solid #e2e8f0; align-items: baseline; }
.info-row:last-child { border-bottom: none; }
.info-label { color: #64748b; font-size: .82rem; width: 92px; flex-shrink: 0; font-weight: 700; }
.info-value { color: #1e293b; font-size: .92rem; font-weight: 600; word-break: break-word; }
.status-ok { color: #15803d; font-weight: 800; }
.status-warn { color: #b45309; font-weight: 800; }
.result-box { padding: 18px; border-radius: 12px; margin: 16px 0; font-size: .96rem; font-weight: 700; line-height: 1.6; }
.result-info { background: #dbeafe; color: #1d4ed8; border: 1px solid #93c5fd; }
.result-error { background: #fee2e2; color: #b91c1c; border: 1px solid #fca5a5; }
.result-note { background: #fff7ed; color: #9a3412; border: 1px solid #fdba74; }
.loading-overlay { color: #64748b; padding: 40px 0; }
.staff-link { display:inline-block; margin-top:12px; color:#2563eb; text-decoration:none; font-size:.9rem; font-weight:700; }
@media (max-width: 480px) {
  .checkin-card { padding: 28px 18px; }
  .info-row { display:block; }
  .info-label { display:block; width:auto; margin-bottom:2px; }
}
</style>
</head>
<body>
<div class="checkin-wrap">
  <div class="checkin-card">
    <div class="checkin-logo">🏛️</div>
    <div class="checkin-title">個資說明會及教育訓練</div>
    <div class="checkin-sub">報名資料確認</div>

    <div id="loadingPanel" class="loading-overlay">驗證報名資料中...</div>

    <div id="errorPanel" style="display:none;">
      <div class="result-box result-error" id="errorMsg"></div>
    </div>

    <div id="confirmPanel" style="display:none;">
      <div class="reg-no-display" id="regNoShow"></div>
      <div class="info-grid" id="infoGrid"></div>
      <div class="result-box result-note">
        本 QR Code 僅作為報名身分確認使用。<br>
        報到、中餐領取、伴手禮領取，請由現場工作人員掃描 QR Code 後辦理。
      </div>
      <a class="staff-link" href="staff-scan.html">工作人員掃描作業</a>
    </div>
  </div>
</div>

<script>
window.API = (function() {
  var GAS_URL = 'https://script.google.com/macros/s/AKfycbw4ev7HTgCFRxeQCDGy3LM25eN5OTwlu_xK20ZxX7wtwpwUEYA6jXoe26UuHpbMSaGGZw/exec';
  async function call(action, data) {
    data = data || {};
    var payload = Object.assign({ action: action }, data);
    var resp = await fetch(GAS_URL, { method: 'POST', redirect: 'follow', body: JSON.stringify(payload) });
    return resp.json();
  }
  return { call: call };
})();

const urlParams = new URLSearchParams(window.location.search);
const REG_NO = (urlParams.get('registrationNo') || urlParams.get('regNo') || '').trim();
const TOKEN  = (urlParams.get('token') || '').trim();

function escapeHtml(value) {
  return String(value || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

async function api(action, data = {}) {
  return API.call(action, data);
}

document.addEventListener('DOMContentLoaded', loadInfo);

async function loadInfo() {
  if (!REG_NO || !TOKEN) {
    showError('無效的 QR Code，請重新掃描。');
    return;
  }

  try {
    const res = await api('getCheckinInfo', { registrationNo: REG_NO, token: TOKEN });
    document.getElementById('loadingPanel').style.display = 'none';
    if (!res.success) {
      showError(res.error || '查無此報名資料');
      return;
    }
    renderConfirmPanel(res.data || {});
  } catch (err) {
    document.getElementById('loadingPanel').style.display = 'none';
    showError('系統連線失敗，請洽現場工作人員。');
  }
}

function renderConfirmPanel(d) {
  document.getElementById('regNoShow').textContent = d.registrationNo || REG_NO;
  const statusClass = d.status === '候補' ? 'status-warn' : 'status-ok';
  document.getElementById('infoGrid').innerHTML = `
    <div class="info-row"><span class="info-label">姓名</span><span class="info-value">${escapeHtml(d.name)}</span></div>
    <div class="info-row"><span class="info-label">單位</span><span class="info-value">${escapeHtml(d.organization)}</span></div>
    <div class="info-row"><span class="info-label">職稱</span><span class="info-value">${escapeHtml(d.title)}</span></div>
    <div class="info-row"><span class="info-label">場次</span><span class="info-value">${escapeHtml(d.sessionName)}</span></div>
    <div class="info-row"><span class="info-label">報名狀態</span><span class="info-value ${statusClass}">${escapeHtml(d.status)}</span></div>
    <div class="info-row"><span class="info-label">報到狀態</span><span class="info-value">${escapeHtml(d.checkinStatus || '未報到')}</span></div>
    <div class="info-row"><span class="info-label">中餐領取</span><span class="info-value">${escapeHtml(d.lunchStatus || '未領取')}</span></div>
    <div class="info-row"><span class="info-label">伴手禮領取</span><span class="info-value">${escapeHtml(d.giftStatus || '未領取')}</span></div>
  `;
  document.getElementById('confirmPanel').style.display = 'block';
}

function showError(msg) {
  document.getElementById('loadingPanel').style.display = 'none';
  document.getElementById('errorMsg').textContent = msg;
  document.getElementById('errorPanel').style.display = 'block';
}
</script>
</body>
</html>
