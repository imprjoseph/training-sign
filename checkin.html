
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>活動報到 — 內政部國土署</title>
  <link rel="stylesheet" href="style.css">
<style>
body { background: #f0f4f8; }
.checkin-wrap { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 16px; }
.checkin-card { background: #fff; border-radius: 20px; padding: 36px 28px; width: 100%; max-width: 480px; box-shadow: 0 8px 40px rgba(0,0,0,.12); text-align: center; }
.checkin-header { margin-bottom: 28px; }
.checkin-logo { font-size: 3rem; margin-bottom: 8px; }
.checkin-title { font-size: 1.25rem; font-weight: 800; color: #1a3a6b; }
.checkin-sub { color: #64748b; font-size: .875rem; margin-top: 4px; }
.info-grid { background: #f5f7fa; border-radius: 12px; padding: 20px; margin: 20px 0; text-align: left; }
.info-row { display: flex; gap: 12px; padding: 8px 0; border-bottom: 1px solid #e2e8f0; align-items: baseline; }
.info-row:last-child { border-bottom: none; }
.info-label { color: #64748b; font-size: .8rem; width: 72px; flex-shrink: 0; font-weight: 600; }
.info-value { color: #1e293b; font-size: .9rem; font-weight: 600; }
.status-confirmed { color: #16a34a; font-weight: 700; }
.status-waitlist  { color: #d97706; font-weight: 700; }
.status-checkin   { color: #2563eb; font-weight: 700; }
.btn-checkin {
  width: 100%; padding: 18px; border: none; border-radius: 14px;
  font-size: 1.2rem; font-weight: 800; cursor: pointer; transition: all .2s;
  background: #16a34a; color: #fff; margin-top: 8px;
  box-shadow: 0 4px 16px rgba(22,163,74,.3);
  letter-spacing: .04em;
}
.btn-checkin:hover { background: #15803d; transform: translateY(-2px); }
.btn-checkin:disabled { background: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-gift {
  width: 100%; padding: 16px; border: 2px solid #2563eb; background: none;
  border-radius: 14px; font-size: 1rem; font-weight: 700; cursor: pointer;
  color: #2563eb; margin-top: 12px; transition: all .2s;
}
.btn-gift:hover { background: #eff6ff; }
.result-box { padding: 20px; border-radius: 12px; margin: 16px 0; font-size: 1rem; font-weight: 600; }
.result-success { background: #dcfce7; color: #15803d; border: 1px solid #86efac; }
.result-warn    { background: #fef3c7; color: #b45309; border: 1px solid #fcd34d; }
.result-error   { background: #fee2e2; color: #b91c1c; border: 1px solid #fca5a5; }
.result-info    { background: #dbeafe; color: #1d4ed8; border: 1px solid #93c5fd; }
.loading-overlay { color: #64748b; padding: 40px 0; }
.reg-no-display { font-size: 1.5rem; font-weight: 900; color: #1a3a6b; margin: 8px 0; }
</style>
</head>
<body>
<div class="checkin-wrap">
  <div class="checkin-card" id="checkinCard">

    <div class="checkin-header">
      <div class="checkin-logo">🏛️</div>
      <div class="checkin-title">個資說明會及教育訓練</div>
      <div class="checkin-sub">內政部國土署 活動報到</div>
    </div>

    <!-- 載入中 -->
    <div id="loadingPanel" class="loading-overlay">
      <p>驗證報名資料中...</p>
    </div>

    <!-- 錯誤 -->
    <div id="errorPanel" style="display:none;">
      <div class="result-box result-error" id="errorMsg"></div>
    </div>

    <!-- 報到確認 -->
    <div id="confirmPanel" style="display:none;">
      <div class="reg-no-display" id="regNoShow"></div>
      <div class="info-grid" id="infoGrid"></div>
      <div id="statusMsg"></div>
      <button class="btn-checkin" id="checkinBtn" onclick="doCheckin()">✅ 完成報到</button>
      <button class="btn-gift" id="giftBtn" onclick="doGift()" style="display:none;">🎁 領取紀念品</button>
    </div>

    <!-- 已報到 -->
    <div id="alreadyPanel" style="display:none;">
      <div class="result-box result-info">
        <div>✅ 已完成報到</div>
        <div id="alreadyTime" style="font-size:.85rem;margin-top:6px;"></div>
      </div>
      <button class="btn-gift" id="giftBtn2" onclick="doGift()">🎁 尚未領取紀念品，點此領取</button>
    </div>

    <!-- 操作結果 -->
    <div id="resultPanel" style="display:none;">
      <div class="result-box" id="resultMsg"></div>
    </div>

  </div>
</div>

<script src="api.js"></script>
<script>
const REG_NO = '<?= registrationNo ?>';
const TOKEN  = '<?= token ?>';
let regData = null;

async function api(action, data = {}) {
  return API.call(action, data);
}

// ── 初始化：取得報名資料 ──
window.onload = async function() {
  if (!REG_NO || !TOKEN) {
    showError('無效的 QR Code，請重新掃描。');
    return;
  }

  const res = await api('getCheckinInfo', { registrationNo: REG_NO, token: TOKEN });

  document.getElementById('loadingPanel').style.display = 'none';

  if (!res.success) {
    showError(res.error || '查無此報名資料');
    return;
  }

  regData = res.data;
  renderConfirmPanel(regData);
};

function renderConfirmPanel(d) {
  document.getElementById('regNoShow').textContent = d.registrationNo;

  const statusClass = d.status === '候補' ? 'status-waitlist' : 'status-confirmed';
  document.getElementById('infoGrid').innerHTML = `
    <div class="info-row"><span class="info-label">姓名</span><span class="info-value">${d.name}</span></div>
    <div class="info-row"><span class="info-label">單位</span><span class="info-value">${d.organization}</span></div>
    <div class="info-row"><span class="info-label">職稱</span><span class="info-value">${d.title}</span></div>
    <div class="info-row"><span class="info-label">場次</span><span class="info-value">${d.sessionName}</span></div>
    <div class="info-row"><span class="info-label">狀態</span><span class="info-value ${statusClass}">${d.status}</span></div>
  `;

  // 已報到
  if (d.checkinStatus === '已報到') {
    document.getElementById('confirmPanel').style.display = 'none';
    document.getElementById('alreadyPanel').style.display = 'block';
    document.getElementById('alreadyTime').textContent = '報到時間：' + (d.checkinTime || '');

    // 未領紀念品才顯示
    if (d.giftStatus !== '已領取') {
      document.getElementById('giftBtn2').style.display = 'block';
    } else {
      document.getElementById('giftBtn2').style.display = 'none';
    }
    return;
  }

  // 候補提示
  if (d.status === '候補') {
    document.getElementById('statusMsg').innerHTML = '<div class="result-box result-warn">⚠️ 此報名者為候補狀態，請工作人員確認後再辦理報到。</div>';
  }

  document.getElementById('confirmPanel').style.display = 'block';
}

async function doCheckin() {
  const btn = document.getElementById('checkinBtn');
  btn.disabled = true;
  btn.textContent = '報到中...';

  const res = await api('doCheckin', {
    registrationNo: REG_NO,
    token: TOKEN,
    operator: 'onsite'
  });

  document.getElementById('confirmPanel').style.display = 'none';
  document.getElementById('resultPanel').style.display = 'block';

  if (res.alreadyCheckin) {
    showResult('info', '⚠️ 此報名者已完成報到（' + (res.checkinTime || '') + '）');
    return;
  }

  if (res.success) {
    const msg = res.isWaitlist
      ? '⚠️ 候補報名者報到成功，請工作人員確認。'
      : '✅ 報到成功！';
    showResult('success', msg);
    // 顯示紀念品按鈕
    setTimeout(() => {
      document.getElementById('giftBtn').style.display = 'block';
    }, 500);
  } else {
    showResult('error', '❌ ' + (res.error || '報到失敗'));
    btn.disabled = false;
    btn.textContent = '✅ 完成報到';
    document.getElementById('confirmPanel').style.display = 'block';
    document.getElementById('resultPanel').style.display = 'none';
  }
}

async function doGift() {
  const res = await api('doGift', {
    registrationNo: REG_NO,
    operator: 'onsite'
  });

  if (res.alreadyReceived) {
    showResult('warn', '⚠️ 此人員已領取紀念品');
    return;
  }
  if (res.success) {
    const msg = res.notCheckin
      ? '🎁 紀念品已記錄（注意：此人員尚未完成報到）'
      : '🎁 紀念品領取成功！';
    showResult('success', msg);
    document.getElementById('giftBtn').style.display = 'none';
    document.getElementById('giftBtn2').style.display = 'none';
  } else {
    showResult('error', '❌ ' + (res.error || '操作失敗'));
  }
}

function showError(msg) {
  document.getElementById('loadingPanel').style.display = 'none';
  document.getElementById('errorPanel').style.display = 'block';
  document.getElementById('errorMsg').textContent = msg;
}

function showResult(type, msg) {
  const el = document.getElementById('resultMsg');
  el.className = 'result-box result-' + type;
  el.textContent = msg;
  document.getElementById('resultPanel').style.display = 'block';
}
</script>
</body>
</html>
