<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>後台管理 — 個資說明會及教育訓練</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#1a3a6b;--primary-l:#2563eb;--primary-xl:#e8f0fe;
  --accent:#d4a017;--text:#1e293b;--text-s:#64748b;
  --border:#e2e8f0;--gray:#f5f7fa;--white:#fff;
  --success:#16a34a;--warn:#d97706;--danger:#dc2626;
  font-family:'Noto Sans TC',sans-serif;
}
html,body{height:100%}
body{background:#f0f4f8;color:var(--text);line-height:1.6}

/* ── Login ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f2544,#1a3a6b)}
.login-box{background:#fff;border-radius:16px;padding:40px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo h1{font-size:1.3rem;color:var(--primary);font-weight:800;margin-top:8px}
.login-logo p{font-size:.85rem;color:var(--text-s);margin-top:4px}
.login-input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:.95rem;font-family:inherit;margin-bottom:16px}
.login-input:focus{outline:none;border-color:var(--primary-l);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.login-btn{width:100%;padding:13px;background:var(--primary-l);color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;transition:background .2s}
.login-btn:hover{background:var(--primary)}
.login-err{background:#fee2e2;color:var(--danger);border:1px solid #fca5a5;border-radius:8px;padding:10px 14px;font-size:.875rem;margin-bottom:14px;display:none}

/* ── Layout ── */
.admin-layout{display:flex;min-height:100vh}

/* ── Sidebar ── */
.sidebar{width:220px;background:var(--primary);color:#fff;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0}
.sb-header{padding:22px 20px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-title{font-weight:800;font-size:.95rem}
.sb-sub{font-size:.72rem;color:rgba(255,255,255,.55);margin-top:2px}
.sb-nav{padding:10px 0;flex:1;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;font-size:.875rem;color:rgba(255,255,255,.7);background:none;border:none;width:100%;text-align:left;transition:all .15s;border-left:3px solid transparent}
.nav-item:hover,.nav-item.active{background:rgba(255,255,255,.1);color:#fff;border-left-color:var(--accent)}
.nav-item .icon{font-size:1rem;width:18px;text-align:center}
.sb-footer{padding:14px 20px;border-top:1px solid rgba(255,255,255,.1)}
.btn-logout{width:100%;padding:8px;background:rgba(220,38,38,.3);border:1px solid rgba(220,38,38,.4);color:#fff;border-radius:6px;cursor:pointer;font-size:.8rem;transition:background .2s}
.btn-logout:hover{background:rgba(220,38,38,.5)}

/* ── Main ── */
.main{flex:1;padding:24px;min-width:0;overflow-y:auto}
.page{display:none}
.page.active{display:block}
.page-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.page-title{font-size:1.35rem;font-weight:800;color:var(--primary)}

/* ── Stat Grid ── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,.06);border-left:4px solid var(--primary-l)}
.stat-card.orange{border-left-color:#f59e0b}.stat-card.green{border-left-color:#16a34a}.stat-card.red{border-left-color:#dc2626}.stat-card.purple{border-left-color:#7c3aed}
.stat-num{font-size:1.9rem;font-weight:900;color:var(--primary);line-height:1}
.stat-lbl{font-size:.75rem;color:var(--text-s);margin-top:4px}

/* ── Card ── */
.card{background:#fff;border-radius:12px;padding:22px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:18px}
.card-title{font-size:.95rem;font-weight:700;color:var(--primary);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}

/* ── Session stat ── */
.ss-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:18px}
.ss-card{background:var(--gray);border-radius:10px;padding:14px;border:1px solid var(--border)}
.ss-name{font-weight:700;color:var(--primary);margin-bottom:8px;font-size:.9rem}
.ss-bar{height:7px;background:#e2e8f0;border-radius:4px;margin:6px 0;overflow:hidden}
.ss-fill{height:100%;background:var(--primary-l);border-radius:4px;transition:width .5s}
.ss-nums{font-size:.78rem;color:var(--text-s)}

/* ── Filter / Table ── */
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.f-input{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:.85rem;font-family:inherit;background:#fff}
.f-input:focus{outline:none;border-color:var(--primary-l)}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.82rem}
th{background:var(--gray);color:var(--text-s);font-size:.73rem;letter-spacing:.04em;padding:9px 11px;text-align:left;border-bottom:2px solid var(--border);white-space:nowrap;font-weight:700}
td{padding:9px 11px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:hover td{background:#f8faff}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.72rem;font-weight:700}
.b-ok{background:#dcfce7;color:#15803d}
.b-wait{background:#fef3c7;color:#92400e}
.b-cancel{background:#fee2e2;color:#991b1b}
.b-in{background:#dbeafe;color:#1d4ed8}

/* ── Buttons ── */
.btn{padding:8px 16px;border:none;border-radius:7px;cursor:pointer;font-size:.82rem;font-weight:600;transition:all .2s;font-family:inherit}
.btn-blue{background:var(--primary-l);color:#fff}.btn-blue:hover{background:var(--primary)}
.btn-green{background:#16a34a;color:#fff}.btn-green:hover{background:#15803d}
.btn-red{background:var(--danger);color:#fff}.btn-red:hover{background:#b91c1c}
.btn-gray{background:var(--border);color:var(--text)}.btn-gray:hover{background:#cbd5e1}
.btn-sm{padding:5px 10px;font-size:.75rem}
.btn-xs{padding:3px 8px;font-size:.72rem}

/* ── Form ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{margin-bottom:14px}
.form-label{display:block;font-weight:600;font-size:.82rem;color:var(--text);margin-bottom:5px}
.form-control{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:7px;font-size:.875rem;font-family:inherit;transition:border-color .2s}
.form-control:focus{outline:none;border-color:var(--primary-l);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
textarea.form-control{resize:vertical;min-height:80px}

/* ── Modal ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:14px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;padding:28px;position:relative}
.modal-title{font-size:1.1rem;font-weight:700;color:var(--primary);margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.modal-close{position:absolute;top:14px;right:14px;background:none;border:1px solid var(--border);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:.9rem;color:var(--text-s)}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* ── Settings ── */
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.settings-full{grid-column:1/-1}
.img-preview{width:100%;max-height:140px;object-fit:cover;border-radius:8px;margin-top:8px;display:none}
.img-preview.show{display:block}

/* ── QR ── */
.qr-frame{background:#000;color:#fff;width:100%;aspect-ratio:16/9;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.qr-frame img{width:200px;height:200px}
.qr-frame .qr-reg{font-size:1.4rem;font-weight:800;letter-spacing:.1em}

/* ── Toast ── */
#toast{position:fixed;bottom:24px;right:24px;background:#1e293b;color:#fff;padding:12px 20px;border-radius:10px;font-size:.9rem;z-index:9999;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none}
#toast.show{opacity:1;transform:translateY(0)}
#toast.ok{background:#15803d}#toast.err{background:#dc2626}

/* ── Loading ── */
.loading-row td{text-align:center;padding:32px;color:var(--text-s)}
.empty-row td{text-align:center;padding:32px;color:var(--text-s)}

@media(max-width:768px){
  .sidebar{width:0;overflow:hidden;position:fixed;z-index:500;transition:width .3s}
  .sidebar.open{width:220px}
  .main{padding:16px}
  .stat-grid{grid-template-columns:1fr 1fr}
  .form-grid{grid-template-columns:1fr}
  .settings-grid{grid-template-columns:1fr}
}
</style>
</head>

  </aside>

  <!-- Main -->
  <main class="main">

    <!-- Dashboard -->
    <div id="page-dashboard" class="page active">
      <div class="page-hd">
        <h1 class="page-title">📊 Dashboard</h1>
        <button class="btn btn-blue btn-sm" onclick="loadDashboard()">🔄 重新整理</button>
      </div>
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-num" id="ds-total">—</div><div class="stat-lbl">總報名人數</div></div>
        <div class="stat-card green"><div class="stat-num" id="ds-confirmed">—</div><div class="stat-lbl">正取人數</div></div>
        <div class="stat-card orange"><div class="stat-num" id="ds-waitlist">—</div><div class="stat-lbl">候補人數</div></div>
        <div class="stat-card red"><div class="stat-num" id="ds-cancelled">—</div><div class="stat-lbl">取消人數</div></div>
        <div class="stat-card purple"><div class="stat-num" id="ds-checkin">—</div><div class="stat-lbl">已報到人數</div></div>
      </div>
      <div class="card">
        <div class="card-title">各場次狀況</div>
        <div class="ss-grid" id="ds-sessions"><div style="color:var(--text-s);padding:12px">載入中…</div></div>
      </div>
    </div>

    <!-- 報名管理 -->
    <div id="page-registrations" class="page">
      <div class="page-hd">
        <h1 class="page-title">📋 報名管理</h1>
        <button class="btn btn-blue btn-sm" onclick="loadRegistrations()">🔄 重新整理</button>
      </div>
      <div class="card">
        <div class="filter-bar">
          <input class="f-input" id="regSearch" placeholder="🔍 姓名 / Email / 序號" oninput="filterReg()">
          <select class="f-input" id="regFilterSession" onchange="filterReg()"><option value="">全部場次</option></select>
          <select class="f-input" id="regFilterStatus" onchange="filterReg()">
            <option value="">全部狀態</option><option>正取</option><option>候補</option><option>取消</option>
          </select>
        </div>
        <div class="tbl-wrap">
          <table id="regTable">
            <thead><tr><th>序號</th><th>姓名</th><th>單位</th><th>Email</th><th>電話</th><th>場次</th><th>狀態</th><th>報到</th><th>操作</th></tr></thead>
            <tbody id="regTbody"><tr class="loading-row"><td colspan="9">載入中…</td></tr></tbody>
          </table>
        </div>
        <div id="regPager" style="margin-top:12px;font-size:.8rem;color:var(--text-s)"></div>
      </div>
    </div>

    <!-- 場次管理 -->
    <div id="page-sessions" class="page">
      <div class="page-hd">
        <h1 class="page-title">📅 場次管理</h1>
        <button class="btn btn-blue btn-sm" onclick="loadSessions_admin()">🔄 重新整理</button>
      </div>
      <div class="card">
        <div class="tbl-wrap">
          <table>
            <thead><tr><th>場次ID</th><th>名稱</th><th>地區</th><th>時段</th><th>日期</th><th>開始</th><th>結束</th><th>容量</th><th>報名</th><th>開放</th><th>操作</th></tr></thead>
            <tbody id="sessionsTbody"><tr class="loading-row"><td colspan="11">載入中…</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 講師管理 -->
    <div id="page-speakers" class="page">
      <div class="page-hd">
        <h1 class="page-title">👤 講師管理</h1>
        <button class="btn btn-green btn-sm" onclick="openSpeakerModal()">＋ 新增講師</button>
      </div>
      <div class="card">
        <div class="tbl-wrap">
          <table>
            <thead><tr><th>ID</th><th>姓名</th><th>單位</th><th>職稱</th><th>顯示</th><th>順序</th><th>操作</th></tr></thead>
            <tbody id="speakersTbody"><tr class="loading-row"><td colspan="7">載入中…</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 內容管理 -->
    <div id="page-content" class="page">
      <div class="page-hd">
        <h1 class="page-title">📝 內容管理</h1>
        <button class="btn btn-blue btn-sm" onclick="saveSettings()">💾 儲存設定</button>
      </div>

      <div class="card">
        <div class="card-title">基本設定</div>
        <div class="settings-grid">
          <div class="form-group"><label class="form-label">活動主辦單位</label><input class="form-control" id="st-organizer" placeholder="內政部國土管理署"></div>
          <div class="form-group"><label class="form-label">服務時間</label><input class="form-control" id="st-hours" placeholder="週一至週五 09:00–17:00"></div>
          <div class="form-group"><label class="form-label">承辦單位</label><input class="form-control" id="st-unit"></div>
          <div class="form-group"><label class="form-label">聯絡人</label><input class="form-control" id="st-person"></div>
          <div class="form-group"><label class="form-label">聯絡電話</label><input class="form-control" id="st-phone"></div>
          <div class="form-group"><label class="form-label">電子信箱</label><input class="form-control" id="st-email"></div>
          <div class="form-group settings-full"><label class="form-label">訓練目的說明</label><textarea class="form-control" id="st-about" rows="3"></textarea></div>
          <div class="form-group settings-full"><label class="form-label">課程說明</label><textarea class="form-control" id="st-course" rows="3"></textarea></div>
          <div class="form-group"><label class="form-label">Banner 圖片 URL（Google Drive）</label><input class="form-control" id="st-banner" placeholder="https://drive.google.com/..."><img class="img-preview" id="prev-banner"></div>
          <div class="form-group"><label class="form-label">Logo URL（Google Drive）</label><input class="form-control" id="st-logo" placeholder="https://drive.google.com/..."><img class="img-preview" id="prev-logo"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">FAQ 管理 <button class="btn btn-green btn-xs" onclick="addFaqRow()">＋ 新增</button></div>
        <div id="faqEditor"></div>
      </div>
    </div>

    <!-- QR 投影 -->
    <div id="page-qr" class="page">
      <div class="page-hd"><h1 class="page-title">📱 QR 投影</h1></div>
      <div class="card">
        <div class="filter-bar">
          <select class="f-input" id="qrSession"><option value="">選擇場次</option></select>
          <select class="f-input" id="qrType">
            <option value="registration">報名 QR（掃碼報到）</option>
            <option value="checkin">現場報到用 QR</option>
          </select>
          <button class="btn btn-blue" onclick="showQR()">產生投影頁</button>
        </div>
        <div id="qrDisplay" style="margin-top:16px"></div>
      </div>
    </div>

    <!-- 匯出 -->
    <div id="page-export" class="page">
      <div class="page-hd"><h1 class="page-title">📤 匯出名單</h1></div>
      <div class="card">
        <div class="filter-bar">
          <select class="f-input" id="expSession"><option value="">全部場次</option></select>
          <select class="f-input" id="expType">
            <option value="all">全部報名</option>
            <option value="confirmed">正取名單</option>
            <option value="waitlist">候補名單</option>
            <option value="checkin">已報到名單</option>
          </select>
          <button class="btn btn-green" onclick="doExport()">📥 匯出 CSV</button>
        </div>
        <div id="expInfo" style="font-size:.85rem;color:var(--text-s);margin-top:8px"></div>
      </div>
    </div>

  </main>
</div><!-- /admin-layout -->

<!-- ── 報名詳情 Modal ── -->
<div class="modal-bg" id="regModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('regModal')">✕</button>
    <div class="modal-title">報名詳情</div>
    <div id="regModalContent"></div>
    <div class="modal-footer">
      <button class="btn btn-red btn-sm" id="regCancelBtn" onclick="cancelReg()">取消報名</button>
      <button class="btn btn-blue btn-sm" id="regCheckinBtn" onclick="manualCheckin()">手動報到</button>
      <button class="btn btn-gray btn-sm" onclick="closeModal('regModal')">關閉</button>
    </div>
  </div>
</div>

<!-- ── 場次編輯 Modal ── -->
<div class="modal-bg" id="sessionModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('sessionModal')">✕</button>
    <div class="modal-title" id="sessionModalTitle">編輯場次</div>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">場次名稱</label><input class="form-control" id="sm-name"></div>
      <div class="form-group"><label class="form-label">地區</label>
        <select class="form-control" id="sm-region"><option>北區</option><option>中區</option><option>南區</option><option>東區</option></select></div>
      <div class="form-group"><label class="form-label">時段</label>
        <select class="form-control" id="sm-slot"><option>上午場</option><option>下午場</option></select></div>
      <div class="form-group"><label class="form-label">日期（YYYY/MM/DD）</label><input class="form-control" id="sm-date" placeholder="2026/06/10"></div>
      <div class="form-group"><label class="form-label">開始時間</label><input class="form-control" id="sm-start" placeholder="09:00"></div>
      <div class="form-group"><label class="form-label">結束時間</label><input class="form-control" id="sm-end" placeholder="12:00"></div>
      <div class="form-group"><label class="form-label">場地名稱</label><input class="form-control" id="sm-venue"></div>
      <div class="form-group"><label class="form-label">場地地址</label><input class="form-control" id="sm-address"></div>
      <div class="form-group"><label class="form-label">容納人數</label><input class="form-control" id="sm-capacity" type="number" value="150"></div>
      <div class="form-group"><label class="form-label">開放報名</label>
        <select class="form-control" id="sm-open"><option value="TRUE">是</option><option value="FALSE">否</option></select></div>
      <div class="form-group" style="grid-column:1/-1"><label class="form-label">交通資訊</label><textarea class="form-control" id="sm-transport" rows="2"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-blue" onclick="saveSession()">💾 儲存</button>
      <button class="btn btn-gray" onclick="closeModal('sessionModal')">取消</button>
    </div>
  </div>

<script>
// ▼▼▼ 請填入你的 GAS Web App URL（與 index.html 相同）▼▼▼
var GAS_URL = 'https://script.google.com/macros/s/AKfycbwQkyL99BKhbOCK3AkX2Gdi8l_6V1UUbnlkh582lPNqtQaBFafECm2P8XsX8hfTESKjsA/exec';
// ▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲

var adminToken = '';
var allRegs = [];
var allRegsFull = [];
var editingSessionId = null;
var editingSpeakerId = null;
var currentRegNo = null;

// ── API ──
async function api(action, extra) {
  if (!GAS_URL || GAS_URL === 'YOUR_GAS_WEBAPP_URL_HERE') {
    console.warn('[admin api] GAS_URL 尚未設定');
    return null;
  }
  var payload = Object.assign({ action: action, token: adminToken }, extra || {});
  try {
    var res = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload),
      redirect: 'follow'
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  } catch(e) {
    console.error('[admin api] 呼叫失敗 ' + action + ':', e.message);
    return null;
  }
}

// ── Login ──
async function doLogin() {
  var pwd = document.getElementById('loginPwd').value;
  var err = document.getElementById('loginErr');
  err.style.display = 'none';
  try {
    var res = await api('adminLogin', { password: pwd });
    if (res && res.success && res.token) {
      adminToken = res.token;
      document.getElementById('loginWrap').style.display = 'none';
      document.getElementById('adminWrap').style.display = 'flex';
      loadDashboard();
      loadSessionsForDropdowns();
    } else {
      err.textContent = res.error || '密碼錯誤';
      err.style.display = 'block';
    }
  } catch(e) {
    err.textContent = '連線失敗：' + e.message;
    err.style.display = 'block';
  }
}
document.getElementById('loginPwd').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });

function doLogout() {
  adminToken = '';
  document.getElementById('adminWrap').style.display = 'none';
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('loginPwd').value = '';
}

// ── Navigation ──
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.nav-item').forEach(function(n){ n.classList.remove('active'); });
  document.getElementById('page-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
  var loaders = { dashboard:'loadDashboard', registrations:'loadRegistrations', sessions:'loadSessions_admin', speakers:'loadSpeakers_admin', content:'loadContent', qr:'loadQRSessions', export:'loadExportSessions' };
  if (loaders[name]) window[loaders[name]]();
}

// ── Toast ──
function toast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + (type||'');
  setTimeout(function(){ el.className = ''; }, 3000);
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// ── Dashboard ──
async function loadDashboard() {
  try {
    var res = await api('getDashboard');
    if (!res.success) { toast('Dashboard 載入失敗','err'); return; }
    var d = res.data;
    document.getElementById('ds-total').textContent     = d.totalRegistrations || 0;
    document.getElementById('ds-confirmed').textContent = d.totalConfirmed     || 0;
    document.getElementById('ds-waitlist').textContent  = d.totalWaitlist      || 0;
    document.getElementById('ds-cancelled').textContent = d.totalCancelled     || 0;
    document.getElementById('ds-checkin').textContent   = d.checkedIn || d.totalCheckin || 0;
    var ss = document.getElementById('ds-sessions');
    if (Array.isArray(d.sessions) && d.sessions.length) {
      var statsArr = d.sessionStats || d.sessions || [];
      ss.innerHTML = statsArr.map(function(s){
        var pct = s.capacity > 0 ? Math.min(100, ((s.confirmed||0)/s.capacity)*100) : 0;
        return '<div class="ss-card"><div class="ss-name">' + s.sessionName + '</div>' +
          '<div class="ss-bar"><div class="ss-fill" style="width:' + pct + '%"></div></div>' +
          '<div class="ss-nums">報名 ' + (s.registrations||0) + ' | 正取 ' + (s.confirmed||0) + ' | 候補 ' + (s.waitlist||0) + ' | 報到 ' + (s.checkedIn||s.checkin||0) + '</div></div>';
      }).join('');
    } else {
      ss.innerHTML = '<div style="color:var(--text-s);padding:12px">暫無場次資料</div>';
    }
  } catch(e) { toast('Dashboard 錯誤：'+e.message,'err'); }

// ── Registrations ──
var regPage = 1, regPageSize = 30;

async function loadRegistrations() {
  document.getElementById('regTbody').innerHTML = '<tr class="loading-row"><td colspan="9">載入中…</td></tr>';
  try {
    var res = await api('getRegistrations', { filters:{} });
    if (!res.success) { toast('報名資料載入失敗','err'); return; }
    allRegsFull = res.data || [];
    allRegs = allRegsFull;
    renderRegTable();
    // populate session dropdown
    var sel = document.getElementById('regFilterSession');
    var sessions = [...new Set(allRegsFull.map(function(r){ return r.sessionName; }).filter(Boolean))];
    sel.innerHTML = '<option value="">全部場次</option>' + sessions.map(function(s){ return '<option>' + s + '</option>'; }).join('');
  } catch(e) { toast('錯誤：'+e.message,'err'); }
}

function filterReg() {
  var q    = document.getElementById('regSearch').value.toLowerCase();
  var sess = document.getElementById('regFilterSession').value;
  var stat = document.getElementById('regFilterStatus').value;
  allRegs = allRegsFull.filter(function(r) {
    var matchQ = !q || [r.name,r.email,r.registrationNo,r.organization].some(function(v){ return v && v.toLowerCase().includes(q); });
    var matchS = !sess || r.sessionName === sess;
    var matchSt= !stat || r.status === stat;
    return matchQ && matchS && matchSt;
  });
  regPage = 1;
  renderRegTable();
}

function renderRegTable() {
  var start = (regPage-1)*regPageSize, end = start+regPageSize;
  var rows = allRegs.slice(start, end);
  var badgeMap = { '正取':'b-ok', '候補':'b-wait', '取消':'b-cancel' };
  document.getElementById('regTbody').innerHTML = rows.length ? rows.map(function(r) {
    return '<tr>' +
      '<td>' + (r.registrationNo||'') + '</td>' +
      '<td>' + (r.name||'') + '</td>' +
      '<td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + (r.organization||'') + '</td>' +
      '<td>' + (r.email||'') + '</td>' +
      '<td>' + (r.phone||'') + '</td>' +
      '<td>' + (r.sessionName||'') + '</td>' +
      '<td><span class="badge ' + (badgeMap[r.status]||'') + '">' + (r.status||'') + '</span></td>' +
      '<td>' + (r.isCheckedIn ? '<span class="badge b-in">已報到</span>' : '—') + '</td>' +
      '<td><button class="btn btn-blue btn-xs" onclick="openRegModal(\'' + r.registrationNo + '\')">詳情</button></td></tr>';
  }).join('') : '<tr class="empty-row"><td colspan="9">無符合資料</td></tr>';
  var total = allRegs.length;
  var pages = Math.ceil(total/regPageSize);
  document.getElementById('regPager').innerHTML = '共 ' + total + ' 筆，第 ' + regPage + '/' + pages + ' 頁 ' +
    (regPage > 1 ? '<button class="btn btn-gray btn-xs" onclick="regPage--;renderRegTable()">上一頁</button> ' : '') +
    (regPage < pages ? '<button class="btn btn-gray btn-xs" onclick="regPage++;renderRegTable()">下一頁</button>' : '');
}

async function openRegModal(no) {
  currentRegNo = no;
  var r = allRegsFull.find(function(x){ return x.registrationNo === no; });
  if (!r) return;
  document.getElementById('regModalContent').innerHTML =
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:.875rem">' +
    row('報到序號',r.registrationNo) + row('姓名',r.name) + row('單位',r.organization) +
    row('職稱',r.title||r.jobTitle) + row('Email',r.email) + row('電話',r.phone) +
    row('產業',r.industryType) + row('飲食',r.mealType||'—') +
    row('場次',r.sessionName) + row('狀態','<span class="badge '+(r.status==='正取'?'b-ok':r.status==='候補'?'b-wait':'b-cancel')+'">' + r.status + '</span>') +
    row('報到',r.isCheckedIn?'✅ 已報到':'—') + row('備註',r.notes||'—') + '</div>';
  document.getElementById('regCancelBtn').style.display = r.status === '取消' ? 'none' : '';
  document.getElementById('regCheckinBtn').style.display = r.isCheckedIn ? 'none' : '';
  document.getElementById('regModal').classList.add('open');
}
function row(k,v){ return '<div><span style="color:var(--text-s);font-size:.78rem">' + k + '</span><div style="margin-top:2px">' + (v||'—') + '</div></div>'; }

async function cancelReg() {
  if (!confirm('確定要取消此報名？')) return;
  try {
    var res = await api('updateRegistration', { data:{ registrationNo: currentRegNo, status:'取消' } });
    if (res.success) { toast('已取消報名','ok'); closeModal('regModal'); loadRegistrations(); }
    else toast(res.error||'操作失敗','err');
  } catch(e) { toast(e.message,'err'); }
}

async function manualCheckin() {
  try {
    var res = await api('manualCheckin', { registrationNo: currentRegNo, operator:'admin' });
    if (res.success) { toast('報到成功','ok'); closeModal('regModal'); loadRegistrations(); }
    else toast(res.error||'報到失敗','err');
  } catch(e) { toast(e.message,'err'); }
}

async function saveSession() {
  var data = {

function openSpeakerModal() {

async function editSpeaker(id) {
  editingSpeakerId = id;
  try {
    var res = await api('manageSpeaker', { data:{ action:'get', speakerId:id } });
    var s = (res.success && res.data) ? res.data : {};
    document.getElementById('spk-name').value  = s.speakerName||'';
    document.getElementById('spk-org').value   = s.speakerOrganization||'';
    document.getElementById('spk-title').value = s.speakerTitle||'';
    document.getElementById('spk-tags').value  = s.speakerTags||'';
    document.getElementById('spk-bio').value   = s.shortBio||'';
    document.getElementById('spk-edu').value   = s.education||'';
    document.getElementById('spk-exp').value   = s.expertise||'';
    document.getElementById('spk-work').value  = s.experience||'';
    document.getElementById('spk-focus').value = s.courseFocus||'';
    document.getElementById('spk-photo').value = s.speakerPhotoUrl||'';
    document.getElementById('spk-order').value = s.displayOrder||1;

    document.getElementById('speakerModal').classList.add('open');
  } catch(e) { toast(e.message,'err'); }
}

async function saveSpeaker() {

    action: editingSpeakerId ? 'update' : 'add',
    speakerId:          editingSpeakerId,
    speakerName:        document.getElementById('spk-name').value,
    speakerOrganization:document.getElementById('spk-org').value,
    speakerTitle:       document.getElementById('spk-title').value,
    speakerTags:        document.getElementById('spk-tags').value,
    shortBio:           document.getElementById('spk-bio').value,
    education:          document.getElementById('spk-edu').value,
    expertise:          document.getElementById('spk-exp').value,
    experience:         document.getElementById('spk-work').value,

    displayOrder:       parseInt(document.getElementById('spk-order').value)||1,

var faqData = [];

  try {
    var res = await api('getFAQ');

  } catch(e) {}
}

function renderFaqEditor() {
  document.getElementById('faqEditor').innerHTML = faqData.map(function(f, i) {
    return '<div style="display:flex;gap:8px;margin-bottom:10px;align-items:flex-start">' +
      '<div style="flex:1"><input class="form-control" style="margin-bottom:6px" placeholder="問題" value="' + esc(f.question||'') + '" onchange="faqData[' + i + '].question=this.value">' +

  }).join('') || '<div style="color:var(--text-s);font-size:.875rem;padding:8px">點擊「＋ 新增」加入常見問題</div>';
}

function addFaqRow() {
  faqData.push({ question:'', answer:'', isVisible:true, displayOrder: faqData.length+1 });
  renderFaqEditor();
}

async function saveFAQ() {
  try {
    var res = await api('updateFAQ', { data: faqData });
    if (res.success) toast('FAQ 已儲存','ok');
  } catch(e) {}
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

async function showQR() {
  var sessionId = document.getElementById('qrSession').value;
  var qrType    = document.getElementById('qrType').value;
  if (!sessionId) { toast('請選擇場次','err'); return; }
  try {
    var res = await api('getQRProjection', { qrType: qrType, sessionId: sessionId });
    if (!res || !res.success) { toast((res&&res.error)||'產生失敗','err'); return; }
    document.getElementById('qrDisplay').innerHTML =
      '<div class="qr-frame">' +
      (res.qrImageUrl ? '<img src="' + res.qrImageUrl + '" alt="QR" style="width:220px;height:220px">' : '<div style="color:#aaa;font-size:.9rem">QR Code 產生中…</div>') +
      '<div class="qr-reg">' + (res.label||res.sessionName||'') + '</div>' +
      '<div style="font-size:.85rem;opacity:.7">' + (res.sessionName||'') + (res.date ? ' · ' + res.date : '') + '</div>' +
      '<div style="font-size:.72rem;opacity:.5;margin-top:4px;word-break:break-all;max-width:320px">' + (res.url||'') + '</div>' +
      '</div>';
  } catch(e) { toast(e.message,'err'); }
}

// ── Export ──
async function loadExportSessions() {
  try {
    var res = await api('getSessions_admin');
    if (!res.success) return;
    var sel = document.getElementById('expSession');
    sel.innerHTML = '<option value="">全部場次</option>' + (res.data||[]).map(function(s){
      return '<option value="' + s.sessionId + '">' + s.sessionName + '</option>';
    }).join('');
  } catch(e) {}
}

async function doExport() {
  var sessionId  = document.getElementById('expSession').value;
  var exportType = document.getElementById('expType').value;
  document.getElementById('expInfo').textContent = '匯出中…';
  try {
    var res = await api('exportList', { exportType: exportType, sessionId: sessionId });
    if (!res.success) { toast(res.error||'匯出失敗','err'); document.getElementById('expInfo').textContent=''; return; }
    var csv = res.data;
    var blob = new Blob(['\uFEFF'+csv], { type:'text/csv;charset=utf-8;' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'export_' + exportType + '_' + new Date().toISOString().slice(0,10) + '.csv';
    a.click();
    document.getElementById('expInfo').textContent = '匯出完成';
    toast('匯出成功','ok');
  } catch(e) { toast(e.message,'err'); document.getElementById('expInfo').textContent=''; }
}

// ── Session dropdowns for other pages ──
async function loadSessionsForDropdowns() {
  try {
    var res = await api('getSessions_admin');
    if (!res.success) return;
  } catch(e) {}
}
</script>
