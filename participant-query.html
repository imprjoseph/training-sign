<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>查詢 QR Code / 報到序號</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>body{margin:0;background:#eef4f7;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",Arial,sans-serif;color:#182635}.wrap{max-width:720px;margin:40px auto;padding:0 18px}.card{background:#fff;border:1px solid #d8e4ea;border-radius:18px;box-shadow:0 8px 24px rgba(8,36,60,.08);padding:28px}h1{font-size:28px;margin:0 0 8px}.sub{color:#64748b;margin-bottom:22px}.grid{display:grid;grid-template-columns:1.2fr .8fr;gap:12px}label{font-size:13px;font-weight:750;margin-bottom:6px;display:block}input{width:100%;height:44px;border:1px solid #d8e4ea;border-radius:10px;padding:0 12px;font-size:15px}.btn{margin-top:16px;border:0;border-radius:999px;padding:12px 22px;background:#0b8f87;color:#fff;font-weight:850;cursor:pointer}.result{margin-top:22px;padding-top:22px;border-top:1px solid #e5eef3}.meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}.meta div{background:#f6f9fb;border:1px solid #e0ebf1;border-radius:12px;padding:11px}.meta b{display:block;font-size:12px;color:#64748b;margin-bottom:3px}.qrbox{text-align:center;margin-top:16px}.msg{padding:12px;border-radius:12px;margin-top:12px}.err{background:#fee2e2;color:#991b1b}.ok{background:#dcfce7;color:#166534}@media(max-width:640px){.grid,.meta{grid-template-columns:1fr}}</style>
</head><body><div class="wrap"><div class="card"><h1>查詢 QR Code / 報到序號</h1><div class="sub">請輸入報名 Email 與手機末三碼。查詢後請於現場出示 QR Code，由工作人員掃描報到與紀錄便當領取。</div><div class="grid"><div><label>報名 Email</label><input id="email" type="email" placeholder="your@email.com"></div><div><label>手機末三碼</label><input id="phoneLast3" inputmode="numeric" maxlength="3" placeholder="例如 123"></div></div><button class="btn" onclick="lookup()">查詢</button><div id="msg"></div><div id="result" class="result" style="display:none"></div></div></div><script>
const API_URL='PASTE_YOUR_GAS_WEB_APP_URL_HERE';
async function lookup(){const email=document.getElementById('email').value.trim();const phoneLast3=document.getElementById('phoneLast3').value.trim();msg('查詢中...','ok');try{const qs=new URLSearchParams({action:'lookupQr',email,phoneLast3});const res=await fetch(`${API_URL}?${qs}`,{redirect:'follow'});const json=await res.json();if(!json.success) throw new Error(json.error||'查詢失敗');render(json.data);msg('查詢成功','ok')}catch(e){msg(e.message,'err');document.getElementById('result').style.display='none'}}
function render(d){const el=document.getElementById('result');el.style.display='block';el.innerHTML=`<h2>${esc(d.name||'')}</h2><div style="color:#64748b">${esc(d.org||'')}</div><div class="meta"><div><b>報到序號</b>${esc(d.reg_no||'')}</div><div><b>Email</b>${esc(d.email_masked||'')}</div><div><b>報到狀態</b>${esc(d.checkin_status||'未報到')}<br>${esc(d.checkin_time||'')}</div><div><b>便當狀態</b>${esc(d.meal_status||'未領取')}<br>${esc(d.meal_time||'')}</div></div><div class="qrbox"><canvas id="qrcanvas"></canvas><div style="font-size:13px;color:#64748b;margin-top:8px">現場請出示此 QR Code</div></div>`; QRCode.toCanvas(document.getElementById('qrcanvas'), d.qr_content || d.qr_url || d.qr_token, {width:220,margin:1});}
function msg(t,type){document.getElementById('msg').innerHTML=t?`<div class="msg ${type}">${esc(t)}</div>`:''} function esc(s){return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
</script></body></html>
