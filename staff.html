<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>工作人員報到 / 便當領取系統</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    :root{--primary:#12385a;--accent:#0b8f87;--danger:#dc2626;--bg:#eef4f7;--card:#fff;--text:#182635;--muted:#64748b;--border:#d8e4ea}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",Arial,sans-serif;color:var(--text)}
    .top{background:linear-gradient(135deg,#08243c,#12385a);color:#fff;padding:18px 20px;box-shadow:0 6px 18px rgba(8,36,60,.18)}
    .top-inner{max-width:1100px;margin:auto;display:flex;justify-content:space-between;gap:16px;align-items:center;flex-wrap:wrap}
    h1{font-size:22px;margin:0;font-weight:850}.sub{font-size:13px;color:rgba(255,255,255,.75);margin-top:4px}
    .wrap{max-width:1100px;margin:22px auto;padding:0 16px}.grid{display:grid;grid-template-columns:360px 1fr;gap:18px;align-items:start}
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 8px 24px rgba(8,36,60,.08);padding:20px}
    label{font-size:13px;font-weight:750;color:#334155;display:block;margin-bottom:6px}input,select{width:100%;height:42px;border:1px solid var(--border);border-radius:10px;padding:0 12px;font-size:15px;background:#fff}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field{margin-bottom:12px}.btn{border:0;border-radius:999px;padding:11px 18px;font-weight:800;cursor:pointer;display:inline-flex;align-items:center;gap:8px;text-decoration:none;justify-content:center}
    .btn-primary{background:var(--accent);color:#fff}.btn-blue{background:#1668ff;color:#fff}.btn-danger{background:var(--danger);color:#fff}.btn-ghost{background:#e6f0f4;color:var(--primary)}.btn:disabled{opacity:.45;cursor:not-allowed}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.mode-tabs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}.mode-tabs button{height:46px;border-radius:12px;border:1px solid var(--border);background:#fff;font-weight:850;color:#334155;cursor:pointer}.mode-tabs button.active{background:var(--primary);color:#fff;border-color:var(--primary)}
    #reader{width:100%;border:1px dashed #a7bac6;border-radius:14px;overflow:hidden;background:#f8fafc;min-height:260px;display:flex;align-items:center;justify-content:center;color:var(--muted)}
    .result{min-height:320px}.person{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:start}.person h2{margin:0 0 8px;font-size:28px}.meta{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin:16px 0}.meta div{background:#f6f9fb;border:1px solid #e0ebf1;border-radius:12px;padding:11px 12px}.meta b{display:block;font-size:12px;color:var(--muted);letter-spacing:.05em;margin-bottom:3px}.tag{display:inline-flex;border-radius:999px;padding:6px 12px;font-weight:850;font-size:13px}.ok{background:#dcfce7;color:#166534}.pending{background:#fff7ed;color:#9a3412}.warn{background:#fee2e2;color:#991b1b}.msg{padding:12px 14px;border-radius:12px;margin:12px 0;font-weight:750}.msg.ok{background:#dcfce7;color:#166534}.msg.err{background:#fee2e2;color:#991b1b}.stats{display:flex;gap:10px;flex-wrap:wrap}.stat{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:12px;padding:10px 14px;min-width:92px}.stat b{font-size:22px;display:block}.stat span{font-size:12px;color:rgba(255,255,255,.72)}
    @media(max-width:860px){.grid{grid-template-columns:1fr}.person{grid-template-columns:1fr}.meta{grid-template-columns:1fr}.row{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="top"><div class="top-inner"><div><h1><i class="fa-solid fa-qrcode"></i> 工作人員報到 / 便當領取系統</h1><div class="sub">掃描 QR Code 或手動輸入報到序號；由工作人員確認後才寫入紀錄</div></div><div class="stats" id="stats"></div></div></div>
  <div class="wrap">
    <div class="grid">
      <div class="card">
        <div class="mode-tabs"><button id="mode-checkin" class="active" onclick="setMode('checkin')">報到模式</button><button id="mode-meal" onclick="setMode('meal')">便當領取</button></div>
        <div class="row"><div class="field"><label>工作人員 PIN</label><input id="staffPin" type="password" placeholder="請輸入 PIN"></div><div class="field"><label>工作人員姓名</label><input id="staffName" type="text" placeholder="例：王小姐"></div></div>
        <div class="field"><label>手動輸入報到序號</label><input id="regNo" type="text" placeholder="例：A0001" onkeydown="if(event.key==='Enter') searchByRegNo()"></div>
        <div class="actions"><button class="btn btn-ghost" onclick="saveStaffLocal()"><i class="fa-solid fa-floppy-disk"></i>記住工作人員</button><button class="btn btn-primary" onclick="searchByRegNo()"><i class="fa-solid fa-magnifying-glass"></i>查詢序號</button></div>
        <hr style="border:0;border-top:1px solid var(--border);margin:18px 0">
        <div id="reader">尚未啟動掃描器</div>
        <div class="actions"><button class="btn btn-blue" onclick="startScanner()"><i class="fa-solid fa-camera"></i>啟動掃描</button><button class="btn btn-ghost" onclick="stopScanner()"><i class="fa-solid fa-stop"></i>停止掃描</button></div>
      </div>
      <div class="card result"><div id="message"></div><div id="personBox"><p style="color:var(--muted);text-align:center;margin-top:120px">請掃描 QR Code 或輸入報到序號查詢。</p></div></div>
    </div>
  </div>
<script>
const API_URL = 'PASTE_YOUR_GAS_WEB_APP_URL_HERE';
let mode = 'checkin';
let scanner = null;
let current = null;

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('staffPin').value = localStorage.getItem('staffPin') || '';
  document.getElementById('staffName').value = localStorage.getItem('staffName') || '';
  const token = new URLSearchParams(location.search).get('token');
  if (token) lookupByToken(token);
  loadStats();
});
function saveStaffLocal(){localStorage.setItem('staffPin',pin());localStorage.setItem('staffName',staffName());showMsg('已儲存工作人員資訊','ok')}
function pin(){return document.getElementById('staffPin').value.trim()} function staffName(){return document.getElementById('staffName').value.trim()||'工作人員'}
function setMode(m){mode=m;document.getElementById('mode-checkin').classList.toggle('active',m==='checkin');document.getElementById('mode-meal').classList.toggle('active',m==='meal');renderPerson();}
async function api(action, params={}){ if(!API_URL || API_URL.includes('PASTE_')) throw new Error('請先在 staff.html 設定 API_URL'); const qs=new URLSearchParams({action, ...params}); const res=await fetch(`${API_URL}?${qs}`,{redirect:'follow'}); const json=await res.json(); if(!json.success) throw new Error(json.error||'API 錯誤'); return json; }
function parseToken(raw){raw=String(raw||'').trim(); if(raw.startsWith('CHECKIN:')) return raw.replace('CHECKIN:','').trim(); try{ if(raw.includes('token=')){ const u=new URL(raw); return u.searchParams.get('token')||raw; }}catch(e){} return raw;}
async function lookupByToken(raw){try{const token=parseToken(raw); const json=await api('getParticipantByToken',{token,staffPin:pin()}); current=json.data; showMsg('查詢成功','ok'); renderPerson();}catch(e){showMsg(e.message,'err')}}
async function searchByRegNo(){try{const reg_no=document.getElementById('regNo').value.trim(); if(!reg_no) return showMsg('請輸入報到序號','err'); const json=await api('getParticipantByRegNo',{reg_no,staffPin:pin()}); current=json.data; showMsg('查詢成功','ok'); renderPerson();}catch(e){showMsg(e.message,'err')}}
async function confirmAction(){if(!current) return showMsg('尚未查詢與會者','err'); try{const action=mode==='checkin'?'staffCheckin':'staffMealPickup'; const params={staffPin:pin(),staffName:staffName()}; if(current.qr_token) params.token=current.qr_token; else params.reg_no=current.reg_no; const json=await api(action,params); current=json.data; showMsg(json.message || '完成','ok'); renderPerson(); loadStats();}catch(e){showMsg(e.message,'err')}}
function renderPerson(){const box=document.getElementById('personBox'); if(!current){box.innerHTML='<p style="color:var(--muted);text-align:center;margin-top:120px">請掃描 QR Code 或輸入報到序號查詢。</p>';return;} const checkOk=current.checkin_status==='已報到'; const mealOk=current.meal_status==='已領取'; box.innerHTML=`<div class="person"><div><h2>${escapeHtml(current.name||'')}</h2><div style="color:var(--muted)">${escapeHtml(current.org||'')} ${current.title?('｜'+escapeHtml(current.title)):''}</div></div><div><span class="tag ${checkOk?'ok':'pending'}">${current.reg_no||''}</span></div></div><div class="meta"><div><b>Email</b>${escapeHtml(current.email||current.email_masked||'')}</div><div><b>電話</b>${escapeHtml(current.phone||'')}</div><div><b>報到狀態</b><span class="tag ${checkOk?'ok':'pending'}">${current.checkin_status||'未報到'}</span><br>${current.checkin_time||''}</div><div><b>便當狀態</b><span class="tag ${mealOk?'ok':'pending'}">${current.meal_status||'未領取'}</span><br>${current.meal_time||''}</div><div><b>飲食</b>${escapeHtml(current.dietary||'')}</div><div><b>備註</b>${escapeHtml(current.remarks||'')}</div></div><div class="actions"><button class="btn ${mode==='checkin'?'btn-primary':'btn-blue'}" onclick="confirmAction()"><i class="fa-solid fa-check"></i>${mode==='checkin'?'確認報到':'確認領取便當'}</button></div>`;}
function showMsg(t,type){document.getElementById('message').innerHTML=t?`<div class="msg ${type==='ok'?'ok':'err'}">${escapeHtml(t)}</div>`:'';}
async function startScanner(){try{if(scanner) await stopScanner(); scanner=new Html5Qrcode('reader'); await scanner.start({facingMode:'environment'},{fps:10,qrbox:{width:240,height:240}}, decoded=>{stopScanner(); lookupByToken(decoded);});}catch(e){showMsg('無法啟動相機：'+e.message,'err')}}
async function stopScanner(){if(scanner){try{await scanner.stop(); await scanner.clear();}catch(e){} scanner=null; document.getElementById('reader').innerHTML='已停止掃描器';}}
async function loadStats(){try{const json=await api('getCheckinStats',{staffPin:pin()||localStorage.getItem('staffPin')||''}); const s=json.data; document.getElementById('stats').innerHTML=`<div class="stat"><b>${s.total}</b><span>報名</span></div><div class="stat"><b>${s.checkedIn}</b><span>已報到</span></div><div class="stat"><b>${s.meals}</b><span>已領便當</span></div>`;}catch(e){}}
function escapeHtml(s){return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
</script>
</body>
</html>
