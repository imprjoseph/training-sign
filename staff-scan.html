<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>工作人員掃描作業 — 內政部國土署</title>
<link rel="stylesheet" href="style.css?v=24">

<!--
  相機掃描說明：
  1. 優先使用 html5-qrcode，支援多數 Android Chrome / iPhone Safari。
  2. 若手機仍無法開啟相機，可直接用下方「序號手動輸入」完成報到／中餐／伴手禮。
-->
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<style>
body { background:#f0f4f8; padding-top:0; color:#1e293b; font-family:'Noto Sans TC', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
.staff-wrap { min-height:100vh; padding:24px 16px; display:flex; justify-content:center; }
.staff-card { width:100%; max-width:800px; background:#fff; border-radius:20px; box-shadow:0 8px 40px rgba(0,0,0,.12); padding:28px; }
.header { text-align:center; margin-bottom:22px; }
.header .icon { font-size:2.6rem; }
.title { font-size:1.35rem; font-weight:900; color:#1a3a6b; margin-top:6px; }
.sub { color:#64748b; font-size:.9rem; }
.panel { border:1px solid #e2e8f0; border-radius:14px; padding:18px; margin:16px 0; background:#f8faff; }
.panel-title { font-weight:800; color:#1a3a6b; margin-bottom:12px; display:flex; align-items:center; justify-content:space-between; gap:10px; }
.form-row { display:grid; grid-template-columns:1fr auto; gap:10px; align-items:center; }
.form-row-3 { display:grid; grid-template-columns:1fr auto auto; gap:10px; align-items:center; }
.input { width:100%; padding:12px 14px; border:1.5px solid #e2e8f0; border-radius:10px; font-size:1rem; box-sizing:border-box; }
.btn { border:0; border-radius:10px; padding:12px 18px; font-weight:800; cursor:pointer; font-size:.96rem; min-height:46px; }
.btn-primary { background:#1a3a6b; color:white; }
.btn-blue { background:#2563eb; color:white; }
.btn-green { background:#16a34a; color:white; }
.btn-orange { background:#d97706; color:white; }
.btn-purple { background:#7c3aed; color:white; }
.btn-red { background:#dc2626; color:white; }
.btn-outline { background:#fff; color:#2563eb; border:1.5px solid #2563eb; }
.btn:disabled { background:#94a3b8; cursor:not-allowed; border-color:#94a3b8; color:#fff; }
.scanner-box { display:none; margin-top:12px; }
#reader { width:100%; max-width:520px; margin:0 auto; border-radius:14px; overflow:hidden; background:#111; }
.scan-status { display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap; margin-top:10px; font-size:.86rem; color:#64748b; }
.scan-status strong { color:#1a3a6b; }
.scan-live { display:inline-flex; align-items:center; gap:6px; font-weight:800; color:#16a34a; }
.scan-live::before { content:''; width:8px; height:8px; border-radius:50%; background:#16a34a; display:inline-block; }
.scan-paused { color:#d97706; font-weight:800; }
.scan-actions { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:14px; }
.info-grid { background:#fff; border-radius:12px; border:1px solid #e2e8f0; padding:16px; }
.info-row { display:flex; gap:12px; padding:8px 0; border-bottom:1px solid #e2e8f0; }
.info-row:last-child { border-bottom:0; }
.info-label { width:100px; color:#64748b; font-size:.84rem; font-weight:800; flex-shrink:0; }
.info-value { font-weight:700; word-break:break-word; }
.badges { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:14px; }
.badge-box { border-radius:12px; padding:12px; text-align:center; background:#f1f5f9; font-weight:800; }
.badge-ok { background:#dcfce7; color:#15803d; }
.badge-wait { background:#fef3c7; color:#b45309; }
.msg { padding:14px 16px; border-radius:12px; margin-top:12px; font-weight:800; line-height:1.55; }
.msg-info { background:#dbeafe; color:#1d4ed8; border:1px solid #93c5fd; }
.msg-success { background:#dcfce7; color:#15803d; border:1px solid #86efac; }
.msg-error { background:#fee2e2; color:#b91c1c; border:1px solid #fca5a5; }
.msg-warn { background:#fef3c7; color:#b45309; border:1px solid #fcd34d; }
.help { font-size:.86rem; color:#64748b; line-height:1.6; margin-top:8px; }
.quick-actions { display:grid; grid-template-columns:repeat(3, 1fr); gap:8px; margin-top:10px; }
.mode-tabs { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }
.small { font-size:.82rem; color:#64748b; }
@media (max-width:640px){
  .staff-wrap { padding:12px 10px; }
  .staff-card { padding:20px 14px; border-radius:16px; }
  .form-row, .form-row-3 { grid-template-columns:1fr; }
  .scan-actions, .badges, .quick-actions, .mode-tabs { grid-template-columns:1fr; }
  .info-row { display:block; }
  .info-label { display:block; width:auto; margin-bottom:2px; }
}
</style>
</head>
<body>
<div class="staff-wrap">
  <div class="staff-card">
    <div class="header">
      <div class="icon">📱</div>
      <div class="title">工作人員現場作業</div>
      <div class="sub">報到／中餐／伴手禮皆由工作人員操作，可掃 QR Code 或手動輸入序號</div>
    </div>

    <div id="loginPanel" class="panel">
      <div class="panel-title">工作人員登入</div>
      <div class="form-row">
        <input class="input" type="password" id="adminPwd" placeholder="請輸入後台管理密碼" onkeydown="if(event.key==='Enter')login()">
        <button class="btn btn-primary" onclick="login()">登入</button>
      </div>
      <div id="loginMsg"></div>
    </div>

    <div id="scanPanel" style="display:none;">
      <div class="panel">
        <div class="panel-title">
          <span>作業模式</span>
          <span class="small">建議手機用 Chrome / Safari 開啟</span>
        </div>
        <div class="mode-tabs">
          <button class="btn btn-blue" onclick="startCameraScan()">開啟相機連續掃描</button>
          <button class="btn btn-outline" onclick="focusManualInput()">無法開相機，改用序號輸入</button>
        </div>

        <div class="scanner-box" id="scannerBox">
          <div id="reader"></div>
          <div class="scan-status">
            <span id="scanState">尚未開始掃描</span>
            <span>本次已掃描：<strong id="scanCount">0</strong> 筆</span>
          </div>
          <button class="btn btn-red" style="width:100%;margin-top:10px;" onclick="stopCameraScan()">停止相機</button>
        </div>

        <div class="help">
          若手機無法開啟相機，常見原因是 LINE 內建瀏覽器、未允許相機權限、或瀏覽器不支援。請改用 Safari / Chrome 開啟；仍不行時，直接使用下方「序號手動輸入」。
        </div>
      </div>

      <div class="panel" id="manualPanel">
        <div class="panel-title">序號手動輸入 / QR Code 內容貼上</div>
        <div class="form-row">
          <input class="input" id="qrInput" placeholder="輸入報到序號，例如 N-AM-001；或貼上 QR Code 網址" onkeydown="if(event.key==='Enter')loadByInput()">
          <button class="btn btn-primary" onclick="loadByInput()">查詢</button>
        </div>
        <div class="help">
          現場可直接輸入報到序號查詢，再按「完成報到／領取中餐／領取伴手禮」。若貼上完整 QR Code 網址，系統會一併驗證 token。
        </div>
      </div>

      <div id="resultPanel" style="display:none;">
        <div class="panel">
          <div class="panel-title">報名資料</div>
          <div class="info-grid" id="infoGrid"></div>
          <div class="badges" id="statusBadges"></div>

          <div class="scan-actions">
            <button class="btn btn-green" onclick="doStaffAction('checkin')">完成報到</button>
            <button class="btn btn-orange" onclick="doStaffAction('lunch')">領取中餐</button>
            <button class="btn btn-purple" onclick="doStaffAction('gift')">領取伴手禮</button>
          </div>

          <div class="quick-actions">
            <button class="btn btn-outline" onclick="clearCurrent()">清除本筆，掃下一位</button>
            <button class="btn btn-outline" onclick="focusManualInput()">輸入下一筆序號</button>
            <button class="btn btn-outline" onclick="startCameraScan()">回到掃描</button>
          </div>

          <div id="actionMsg"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
window.API = (function() {
  var GAS_URL = 'https://script.google.com/macros/s/AKfycbw4ev7HTgCFRxeQCDGy3LM25eN5OTwlu_xK20ZxX7wtwpwUEYA6jXoe26UuHpbMSaGGZw/exec';
  async function call(action, data) {
    data = data || {};
    var payload = Object.assign({ action: action }, data);
    var resp = await fetch(GAS_URL, { method:'POST', redirect:'follow', body: JSON.stringify(payload) });
    return resp.json();
  }
  return { call: call };
})();

let adminToken = localStorage.getItem('staff_admin_token') || '';
let currentQr = { registrationNo:'', qrToken:'' };
let currentData = null;
let html5QrCode = null;
let scanning = false;
let scanCount = 0;
let lastScanKey = '';
let lastScanAt = 0;
let scanBusy = false;

function escapeHtml(value) {
  return String(value || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function showMsg(elId, type, msg) {
  const el = document.getElementById(elId);
  if (!el) return;
  el.innerHTML = '<div class="msg msg-' + type + '">' + escapeHtml(msg) + '</div>';
}

function setScanState(html) {
  const el = document.getElementById('scanState');
  if (el) el.innerHTML = html;
}

function bumpScanCount() {
  scanCount += 1;
  const el = document.getElementById('scanCount');
  if (el) el.textContent = String(scanCount);
}

async function login() {
  const pwd = document.getElementById('adminPwd').value;
  try {
    const res = await API.call('adminLogin', { password: pwd });
    if (!res.success) {
      showMsg('loginMsg', 'error', res.error || '登入失敗');
      return;
    }
    adminToken = res.token;
    localStorage.setItem('staff_admin_token', adminToken);
    document.getElementById('loginPanel').style.display = 'none';
    document.getElementById('scanPanel').style.display = 'block';
    setTimeout(focusManualInput, 100);
  } catch (err) {
    showMsg('loginMsg', 'error', '系統連線失敗，請確認網路或 GAS URL');
  }
}

document.addEventListener('DOMContentLoaded', function() {
  if (adminToken) {
    document.getElementById('loginPanel').style.display = 'none';
    document.getElementById('scanPanel').style.display = 'block';
  }
});

function parseQrText(text) {
  text = String(text || '').trim();
  if (!text) return null;

  let registrationNo = '';
  let qrToken = '';

  try {
    const url = new URL(text);
    registrationNo = (url.searchParams.get('registrationNo') || url.searchParams.get('regNo') || '').trim();
    qrToken = (url.searchParams.get('token') || '').trim();
  } catch(e) {
    registrationNo = text;
  }

  if (!registrationNo) return null;
  return { registrationNo, qrToken };
}

function focusManualInput() {
  document.getElementById('manualPanel').scrollIntoView({ behavior:'smooth', block:'center' });
  setTimeout(function() {
    const input = document.getElementById('qrInput');
    input.focus();
    input.select();
  }, 300);
}

async function loadByInput() {
  const input = document.getElementById('qrInput');
  const parsed = parseQrText(input.value);
  if (!parsed) {
    showMsg('actionMsg', 'error', '請輸入報到序號，或貼上 QR Code 網址');
    return;
  }
  await loadRegistration(parsed.registrationNo, parsed.qrToken);
}

async function loadRegistration(registrationNo, qrToken) {
  currentQr = { registrationNo, qrToken };
  document.getElementById('resultPanel').style.display = 'none';

  try {
    const res = await API.call('staffGetScanInfo', {
      token: adminToken,
      registrationNo: registrationNo,
      qrToken: qrToken || ''
    });

    if (!res.success) {
      showMsg('actionMsg', 'error', res.error || '查詢失敗');
      return;
    }

    currentData = res.data || {};
    renderData(currentData);
    document.getElementById('resultPanel').style.display = 'block';
    document.getElementById('actionMsg').innerHTML = '';
    document.getElementById('resultPanel').scrollIntoView({ behavior:'smooth', block:'start' });

  } catch (err) {
    showMsg('actionMsg', 'error', '查詢發生錯誤，請確認網路連線');
  }
}

function renderData(d) {
  document.getElementById('infoGrid').innerHTML = `
    <div class="info-row"><span class="info-label">報到序號</span><span class="info-value">${escapeHtml(d.registrationNo)}</span></div>
    <div class="info-row"><span class="info-label">姓名</span><span class="info-value">${escapeHtml(d.name)}</span></div>
    <div class="info-row"><span class="info-label">單位</span><span class="info-value">${escapeHtml(d.organization)}</span></div>
    <div class="info-row"><span class="info-label">職稱</span><span class="info-value">${escapeHtml(d.title)}</span></div>
    <div class="info-row"><span class="info-label">場次</span><span class="info-value">${escapeHtml(d.sessionName)}</span></div>
    <div class="info-row"><span class="info-label">報名狀態</span><span class="info-value">${escapeHtml(d.status)}</span></div>
  `;

  function box(label, value) {
    const ok = String(value || '').indexOf('已') === 0;
    return '<div class="badge-box ' + (ok ? 'badge-ok' : 'badge-wait') + '">' + label + '<br>' + escapeHtml(value || '未完成') + '</div>';
  }

  document.getElementById('statusBadges').innerHTML =
    box('報到', d.checkinStatus || '未報到') +
    box('中餐', d.lunchStatus || '未領取') +
    box('伴手禮', d.giftStatus || '未領取');
}

async function doStaffAction(scanType) {
  if (!currentQr.registrationNo) {
    showMsg('actionMsg', 'error', '請先掃描 QR Code 或輸入序號查詢報名資料');
    focusManualInput();
    return;
  }

  try {
    const res = await API.call('staffScanAction', {
      token: adminToken,
      registrationNo: currentQr.registrationNo,
      qrToken: currentQr.qrToken || '',
      scanType: scanType,
      operator: 'onsite_staff'
    });

    if (!res.success) {
      showMsg('actionMsg', res.alreadyDone ? 'warn' : 'error', res.message || res.error || '操作失敗');
      if (res.data) renderData(res.data);
      return;
    }

    showMsg('actionMsg', 'success', res.message || '操作完成');
    if (res.data) renderData(res.data);

    // 操作完成後保留相機連續掃描；手動模式則清空輸入框方便下一位。
    document.getElementById('qrInput').value = '';

  } catch (err) {
    showMsg('actionMsg', 'error', '操作發生錯誤，請確認網路連線');
  }
}

async function startCameraScan() {
  document.getElementById('scannerBox').style.display = 'block';
  setScanState('<span class="scan-paused">正在啟動相機...</span>');

  if (scanning) {
    setScanState('<span class="scan-live">連續掃描中</span>');
    return;
  }

  if (typeof Html5Qrcode === 'undefined') {
    setScanState('<span class="scan-paused">無法載入掃描元件</span>');
    showMsg('actionMsg', 'warn', '掃描元件載入失敗，請改用序號手動輸入。');
    focusManualInput();
    return;
  }

  try {
    html5QrCode = new Html5Qrcode("reader");

    const config = {
      fps: 10,
      qrbox: function(viewfinderWidth, viewfinderHeight) {
        const minEdge = Math.min(viewfinderWidth, viewfinderHeight);
        const size = Math.floor(minEdge * 0.72);
        return { width: size, height: size };
      },
      rememberLastUsedCamera: true,
      supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
    };

    await html5QrCode.start(
      { facingMode: "environment" },
      config,
      onScanSuccess,
      function() {}
    );

    scanning = true;
    setScanState('<span class="scan-live">連續掃描中，請掃描與會者 QR Code</span>');

  } catch (err) {
    scanning = false;
    setScanState('<span class="scan-paused">相機啟動失敗</span>');
    showMsg('actionMsg', 'warn', '手機無法開啟相機。請確認相機權限，或改用下方序號手動輸入。');
    focusManualInput();
  }
}

async function onScanSuccess(decodedText) {
  if (scanBusy) return;

  const parsed = parseQrText(decodedText);
  if (!parsed) return;

  const key = parsed.registrationNo + '|' + parsed.qrToken;
  const now = Date.now();

  // 避免同一張 QR Code 停在鏡頭前時重複觸發
  if (key === lastScanKey && now - lastScanAt < 5000) return;

  scanBusy = true;
  lastScanKey = key;
  lastScanAt = now;

  document.getElementById('qrInput').value = decodedText;
  setScanState('<span class="scan-paused">已掃到 QR Code，讀取資料中...</span>');

  try {
    await loadRegistration(parsed.registrationNo, parsed.qrToken);
    bumpScanCount();
    if (navigator.vibrate) navigator.vibrate(120);
    setScanState('<span class="scan-live">連續掃描中，請掃下一位</span>');
  } finally {
    setTimeout(function() { scanBusy = false; }, 1200);
  }
}

async function stopCameraScan() {
  try {
    if (html5QrCode && scanning) {
      await html5QrCode.stop();
      await html5QrCode.clear();
    }
  } catch (e) {}

  scanning = false;
  html5QrCode = null;
  setScanState('已停止掃描');
  document.getElementById('scannerBox').style.display = 'none';
}

function clearCurrent() {
  currentQr = { registrationNo:'', qrToken:'' };
  currentData = null;
  document.getElementById('qrInput').value = '';
  document.getElementById('resultPanel').style.display = 'none';
  document.getElementById('actionMsg').innerHTML = '';
  focusManualInput();
}
</script>
</body>
</html>
