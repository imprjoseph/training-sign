<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工作人員掃描作業</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
body{margin:0;background:#f0f4f8;color:#1e293b;font-family:system-ui,"Noto Sans TC",sans-serif}
.wrap{max-width:760px;margin:0 auto;padding:16px}
.card{background:#fff;border-radius:18px;box-shadow:0 8px 32px rgba(0,0,0,.12);padding:20px}
h1{font-size:1.35rem;color:#1a3a6b;text-align:center;margin:6px 0 4px}
.sub{text-align:center;color:#64748b;font-size:.9rem;line-height:1.6}
.panel{background:#f8faff;border:1px solid #e2e8f0;border-radius:14px;padding:16px;margin:14px 0}
.title{font-weight:900;color:#1a3a6b;margin-bottom:10px}
.row{display:grid;grid-template-columns:1fr auto;gap:8px}
input{width:100%;box-sizing:border-box;padding:12px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:1rem}
button{border:0;border-radius:10px;padding:12px 14px;font-weight:900;cursor:pointer;font-size:.95rem}
.primary{background:#1a3a6b;color:#fff}.blue{background:#2563eb;color:#fff}.green{background:#16a34a;color:#fff}.orange{background:#d97706;color:#fff}.purple{background:#7c3aed;color:#fff}.red{background:#dc2626;color:#fff}.outline{background:#fff;color:#2563eb;border:1.5px solid #2563eb}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.mode{background:#fff;color:#1a3a6b;border:2px solid #dbeafe}
.mode.active{background:#1a3a6b;color:#fff;border-color:#1a3a6b}
.mode small{display:block;margin-top:4px;color:#64748b}.mode.active small{color:#e2e8f0}
.current{margin-top:10px;background:#e8f0fe;color:#1d4ed8;border-radius:12px;padding:10px;text-align:center;font-weight:900}
#scannerBox{display:none}.reader{width:100%;max-width:520px;margin:12px auto;border-radius:14px;overflow:hidden;background:#111}
.msg{padding:12px;border-radius:12px;margin-top:10px;font-weight:800;line-height:1.5}
.info{background:#dbeafe;color:#1d4ed8}.ok{background:#dcfce7;color:#15803d}.warn{background:#fef3c7;color:#b45309}.err{background:#fee2e2;color:#b91c1c}
.data{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:12px}
.line{display:flex;gap:10px;border-bottom:1px solid #e2e8f0;padding:7px 0}.line:last-child{border-bottom:0}.label{width:90px;color:#64748b;font-weight:900}.val{font-weight:800}
.badges{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}.badge{background:#f1f5f9;border-radius:12px;padding:10px;text-align:center;font-weight:900}.done{background:#dcfce7;color:#15803d}.todo{background:#fef3c7;color:#b45309}
.history{max-height:220px;overflow:auto;background:#fff;border:1px solid #e2e8f0;border-radius:12px}.item{padding:9px 10px;border-bottom:1px solid #e2e8f0;font-size:.88rem}.item:last-child{border-bottom:0}
.help{color:#64748b;font-size:.86rem;line-height:1.6;margin-top:8px}
@media(max-width:640px){.row,.grid3,.badges{grid-template-columns:1fr}.line{display:block}.label{width:auto}}
</style>
</head>
<body>
<div class="wrap"><div class="card">
<h1>工作人員現場作業</h1>
<div class="sub">請先選擇作業模式，再掃 QR Code 或輸入序號。每掃到一筆會自動寫入系統。</div>

<div id="loginPanel" class="panel">
  <div class="title">工作人員登入</div>
  <div class="row">
    <input type="password" id="adminPwd" placeholder="請輸入後台管理密碼" onkeydown="if(event.key==='Enter')login()">
    <button class="primary" onclick="login()">登入</button>
  </div>
  <div id="loginMsg"></div>
</div>

<div id="workPanel" style="display:none">
  <div class="panel">
    <div class="title">1. 選擇本台作業模式</div>
    <div class="grid3">
      <button id="mode-checkin" class="mode active" onclick="setMode('checkin')">完成報到<small>報到櫃台</small></button>
      <button id="mode-lunch" class="mode" onclick="setMode('lunch')">領取中餐<small>餐盒發放</small></button>
      <button id="mode-gift" class="mode" onclick="setMode('gift')">領取伴手禮<small>禮品發放</small></button>
    </div>
    <div class="current" id="currentModeText">目前模式：完成報到</div>
  </div>

  <div class="panel">
    <div class="title">2. 掃描 QR Code 或輸入序號</div>
    <div class="grid3">
      <button class="blue" onclick="startCameraScan()">開啟相機連續掃描</button>
      <button class="outline" onclick="focusManualInput()">使用序號輸入</button>
      <button class="red" onclick="stopCameraScan()">停止相機</button>
    </div>
    <div id="scannerBox">
      <div id="reader" class="reader"></div>
      <div class="help">狀態：<span id="scanState">尚未開始</span>｜本次已處理：<b id="scanCount">0</b> 筆</div>
    </div>
    <div class="row" style="margin-top:12px">
      <input id="qrInput" placeholder="輸入報到序號，例如 N-AM-001；或貼上 QR Code 網址" onkeydown="if(event.key==='Enter')processManualInput()">
      <button class="primary" onclick="processManualInput()">送出處理</button>
    </div>
    <div class="help">相機無法開啟時，請用 Safari / Chrome，不要用 LINE 內建瀏覽器；仍無法使用時，直接輸入序號。</div>
    <div id="actionMsg"></div>
  </div>

  <div id="resultPanel" class="panel" style="display:none">
    <div class="title">最近一筆資料</div>
    <div id="infoGrid" class="data"></div>
    <div id="statusBadges" class="badges"></div>
    <div class="grid3" style="margin-top:10px">
      <button class="green" onclick="manualAction('checkin')">補按報到</button>
      <button class="orange" onclick="manualAction('lunch')">補按中餐</button>
      <button class="purple" onclick="manualAction('gift')">補按伴手禮</button>
    </div>
  </div>

  <div class="panel">
    <div class="title">處理紀錄</div>
    <div id="historyList" class="history"><div class="item">尚無處理紀錄</div></div>
  </div>
</div>
</div></div>

<script>
window.API=(function(){
  var GAS_URL='https://script.google.com/macros/s/AKfycbw4ev7HTgCFRxeQCDGy3LM25eN5OTwlu_xK20ZxX7wtwpwUEYA6jXoe26UuHpbMSaGGZw/exec';
  async function call(action,data){
    data=data||{};
    var resp=await fetch(GAS_URL,{method:'POST',redirect:'follow',body:JSON.stringify(Object.assign({action:action},data))});
    return resp.json();
  }
  return{call:call};
})();
let adminToken=localStorage.getItem('staff_admin_token')||'';
let currentMode='checkin',currentQr={registrationNo:'',qrToken:''},html5QrCode=null,scanning=false,scanBusy=false,scanCount=0,lastScanKey='',lastScanAt=0;
const modeText={checkin:'完成報到',lunch:'領取中餐',gift:'領取伴手禮'};
function esc(v){return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function msg(cls,t){document.getElementById('actionMsg').innerHTML='<div class="msg '+cls+'">'+esc(t)+'</div>'}
function addHistory(cls,t){let l=document.getElementById('historyList');if(l.textContent.trim()==='尚無處理紀錄')l.innerHTML='';let d=document.createElement('div');d.className='item '+cls;d.textContent=new Date().toLocaleTimeString('zh-TW',{hour12:false})+'　'+t;l.insertBefore(d,l.firstChild)}
function setMode(m){currentMode=m;['checkin','lunch','gift'].forEach(x=>document.getElementById('mode-'+x).classList.toggle('active',x===m));document.getElementById('currentModeText').textContent='目前模式：'+modeText[m];msg('info','已切換為「'+modeText[m]+'」模式，接下來掃描或輸入序號會自動寫入。')}
async function login(){try{let r=await API.call('adminLogin',{password:document.getElementById('adminPwd').value});if(!r.success){document.getElementById('loginMsg').innerHTML='<div class="msg err">'+esc(r.error||'登入失敗')+'</div>';return}adminToken=r.token;localStorage.setItem('staff_admin_token',adminToken);document.getElementById('loginPanel').style.display='none';document.getElementById('workPanel').style.display='block';setMode('checkin')}catch(e){document.getElementById('loginMsg').innerHTML='<div class="msg err">連線失敗</div>'}}
document.addEventListener('DOMContentLoaded',()=>{if(adminToken){document.getElementById('loginPanel').style.display='none';document.getElementById('workPanel').style.display='block';setMode('checkin')}})
function parseQrText(t){t=String(t||'').trim();if(!t)return null;let registrationNo='',qrToken='';try{let u=new URL(t);registrationNo=(u.searchParams.get('registrationNo')||u.searchParams.get('regNo')||'').trim();qrToken=(u.searchParams.get('token')||'').trim()}catch(e){registrationNo=t}return registrationNo?{registrationNo,qrToken}:null}
function focusManualInput(){let i=document.getElementById('qrInput');i.scrollIntoView({behavior:'smooth',block:'center'});setTimeout(()=>{i.focus();i.select()},250)}
async function processManualInput(){let p=parseQrText(document.getElementById('qrInput').value);if(!p){msg('err','請輸入報到序號或貼上 QR Code 網址');return}await processScan(p.registrationNo,p.qrToken)}
async function processScan(registrationNo,qrToken){
  currentQr={registrationNo:registrationNo,qrToken:qrToken||''}; msg('info','正在寫入「'+modeText[currentMode]+'」：'+registrationNo);
  try{
    let r=await API.call('staffScanAction',{token:adminToken,registrationNo:registrationNo,qrToken:qrToken||'',scanType:currentMode,operator:'onsite_staff'});
    if(!r.success){
      let m=r.message||r.error||'操作失敗'; msg(r.alreadyDone?'warn':'err',m); addHistory(r.alreadyDone?'warn':'err',registrationNo+'｜'+modeText[currentMode]+'｜'+m);
      if(r.data)renderData(r.data); else await loadOnly(registrationNo,qrToken); return;
    }
    msg('ok',registrationNo+'｜'+(r.message||('已完成：'+modeText[currentMode]))); addHistory('ok',registrationNo+'｜'+modeText[currentMode]+'｜完成');
    if(r.data)renderData(r.data); else await loadOnly(registrationNo,qrToken);
    document.getElementById('qrInput').value=''; scanCount++; document.getElementById('scanCount').textContent=scanCount; if(navigator.vibrate)navigator.vibrate(120);
  }catch(e){msg('err','寫入系統失敗，請確認 Code.gs 已部署 staffScanAction');addHistory('err',registrationNo+'｜寫入失敗')}
}
async function loadOnly(registrationNo,qrToken){try{let r=await API.call('staffGetScanInfo',{token:adminToken,registrationNo:registrationNo,qrToken:qrToken||''});if(r.success&&r.data)renderData(r.data)}catch(e){}}
function renderData(d){
  document.getElementById('resultPanel').style.display='block';
  document.getElementById('infoGrid').innerHTML=
  '<div class="line"><span class="label">報到序號</span><span class="val">'+esc(d.registrationNo)+'</span></div>'+
  '<div class="line"><span class="label">姓名</span><span class="val">'+esc(d.name)+'</span></div>'+
  '<div class="line"><span class="label">單位</span><span class="val">'+esc(d.organization)+'</span></div>'+
  '<div class="line"><span class="label">職稱</span><span class="val">'+esc(d.title)+'</span></div>'+
  '<div class="line"><span class="label">場次</span><span class="val">'+esc(d.sessionName)+'</span></div>';
  function box(l,v){v=String(v||'');let ok=v.indexOf('已')===0||v.indexOf('完成')>=0;return '<div class="badge '+(ok?'done':'todo')+'">'+l+'<br>'+esc(v||'未完成')+'</div>'}
  document.getElementById('statusBadges').innerHTML=box('報到',d.checkinStatus||'未報到')+box('中餐',d.lunchStatus||'未領取')+box('伴手禮',d.giftStatus||'未領取');
}
async function manualAction(t){if(!currentQr.registrationNo){msg('err','請先掃描或輸入序號');return}let old=currentMode;setMode(t);await processScan(currentQr.registrationNo,currentQr.qrToken);setMode(old)}
async function startCameraScan(){
  document.getElementById('scannerBox').style.display='block';document.getElementById('scanState').textContent='正在啟動相機...';
  if(scanning){document.getElementById('scanState').textContent='連續掃描中：'+modeText[currentMode];return}
  if(typeof Html5Qrcode==='undefined'){msg('warn','掃描套件載入失敗，請改用序號輸入');return}
  try{
    html5QrCode=new Html5Qrcode('reader');
    await html5QrCode.start({facingMode:'environment'},{fps:10,qrbox:{width:250,height:250}},onScanSuccess,function(){});
    scanning=true;document.getElementById('scanState').textContent='連續掃描中：'+modeText[currentMode];
  }catch(e){msg('warn','相機啟動失敗，請改用序號手動輸入');focusManualInput()}
}
async function onScanSuccess(decodedText){
  if(scanBusy)return;let p=parseQrText(decodedText);if(!p)return;
  let key=p.registrationNo+'|'+p.qrToken+'|'+currentMode,now=Date.now();if(key===lastScanKey&&now-lastScanAt<5000)return;
  scanBusy=true;lastScanKey=key;lastScanAt=now;document.getElementById('qrInput').value=decodedText;document.getElementById('scanState').textContent='已掃到，正在寫入：'+modeText[currentMode];
  try{await processScan(p.registrationNo,p.qrToken);document.getElementById('scanState').textContent='連續掃描中：'+modeText[currentMode]}finally{setTimeout(()=>scanBusy=false,1200)}
}
async function stopCameraScan(){try{if(html5QrCode&&scanning){await html5QrCode.stop();await html5QrCode.clear()}}catch(e){}scanning=false;html5QrCode=null;document.getElementById('scannerBox').style.display='none';}
</script>
</body>
</html>
